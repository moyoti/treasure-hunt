version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: treasure-hunt-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: treasure_hunt
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - treasure-hunt-dev-network

volumes:
  postgres_dev_data:

networks:
  treasure-hunt-dev-network:
    driver: bridge