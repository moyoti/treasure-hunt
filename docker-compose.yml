version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: treasure-hunt-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: treasure_hunt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - treasure-hunt-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: treasure-hunt-backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=treasure_hunt
      - JWT_SECRET=your-jwt-secret-change-in-production
      - JWT_EXPIRES_IN=7d
      - PORT=3000
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - treasure-hunt-network
    restart: unless-stopped

  # Optional: Redis for caching and real-time features
  redis:
    image: redis:7-alpine
    container_name: treasure-hunt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - treasure-hunt-network

volumes:
  postgres_data:
  redis_data:

networks:
  treasure-hunt-network:
    driver: bridge